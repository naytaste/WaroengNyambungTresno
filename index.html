    function renderMenu() {
      const grid = document.getElementById('menu-grid');
      const filtered = currentCategory === 'all'

        : menuItems.filter(item => item.category === currentCategory);

      grid.innerHTML = filtered.map(item => {
        const cartItem = cart.find(c => c.id === item.id);
        const quantity = cartItem ? cartItem.quantity : 0;

        return `
          <div class="bg-white rounded-xl shadow-md overflow-hidden fade-in hover:shadow-lg transition-shadow">

    function filterCategory(category) {
      currentCategory = category;

      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('bg-pink-600', 'text-white');
        btn.classList.add('bg-pink-100', 'text-pink-700');
      });

      event.target.classList.remove('bg-pink-100', 'text-pink-700');
      event.target.classList.add('bg-pink-600', 'text-white');

      renderMenu();
    }

    function addToCart(itemId) {
      const item = menuItems.find(m => m.id === itemId);
      if (!item) return;

      const existing = cart.find(c => c.id === itemId);
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({ ...item, quantity: 1, customization: {} });
      }

      updateCartUI();
      renderMenu();

      const countEl = document.getElementById('cart-count');
      countEl.classList.add('cart-bounce');
      setTimeout(() => countEl.classList.remove('cart-bounce'), 300);
    }

            <label class="font-bold text-gray-800 block mb-2">🌶️ Pilih Bumbu (bisa lebih dari 1):</label>
            <div class="space-y-2">
              ${item.bumbu.map(bumbu => `
                <label class="flex items-center gap-3 p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-pink-50 transition-colors">
                  <input type="checkbox" name="bumbu" value="${bumbu}" onchange="updateMultiSelection('bumbu')" class="w-4 h-4">
                  <span>${bumbu}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Items (Frozen Food)
      if (item.items && item.items.length > 0) {
        html += `
          <div>
            <label class="font-bold text-gray-800 block mb-2">❄️ Pilih Item (bisa lebih dari 1):</label>
            <div class="space-y-2">
              ${item.items.map(itemOption => `
                <label class="flex items-center gap-3 p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-pink-50 transition-colors">
                  <input type="checkbox" name="items" value="${itemOption}" onchange="updateMultiSelection('items')" class="w-4 h-4">
                  <span>${itemOption}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Rasa options (dengan batasan maxRasa jika ada)
      if (item.rasa && item.rasa.length > 0) {
        const maxRasa = item.maxRasa || 999;
        const rasaText = maxRasa === 1 ? `✨ Pilih Rasa (1 pilihan):` : `✨ Pilih Rasa (max ${maxRasa}):`;
        html += `
          <div>
            <label class="font-bold text-gray-800 block mb-2">${rasaText}</label>
            <div class="space-y-2">
              ${item.rasa.map(rasa => `
                <label class="flex items-center gap-3 p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-pink-50 transition-colors">
                  <input type="checkbox" name="rasa" value="${rasa}" onchange="updateRasaSelection('${item.id}')" class="w-4 h-4">
                  <span>${rasa}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Topping options (dengan batasan maxTopping jika ada)
      if (item.topping && item.topping.length > 0) {
        const maxTopping = item.maxTopping || 999;
        const toppingText = maxTopping === 1 ? `🎀 Pilih Topping (1 pilihan):` : `🎀 Pilih Topping (bisa lebih dari 1):`;
        html += `
          <div>
            <label class="font-bold text-gray-800 block mb-2">${toppingText}</label>
            <div class="space-y-2">
              ${item.topping.map(top => {
                const toppingPrice = item.toppingPrice ? `<span class="text-xs text-gray-500">(+${formatCurrency(item.toppingPrice)})</span>` : '';
                return `
                  <label class="flex items-center gap-3 p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-pink-50 transition-colors">
                    <input type="checkbox" name="topping" value="${top}" onchange="updateToppingSelection('${item.id}')" class="w-4 h-4">
                    <span>${top} ${toppingPrice}</span>
                  </label>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      // Sauce options
      if (item.sauce && item.sauce.length > 0) {
        html += `
          <div>
            <label class="font-bold text-gray-800 block mb-2">🍯 Pilih Sauce (bisa lebih dari 1):</label>
            <div class="space-y-2">
              ${item.sauce.map(sauce => `
                <label class="flex items-center gap-3 p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-pink-50 transition-colors">
                  <input type="checkbox" name="sauce" value="${sauce}" onchange="updateMultiSelection('sauce')" class="w-4 h-4">
                  <span>${sauce}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Nasi Varian
      if (item.nasiVarian && item.nasiVarian.length > 0) {
        html += `
          <div>
            <label class="font-bold text-gray-800 block mb-2">🍚 Pilih Nasi (bisa lebih dari 1):</label>
            <div class="space-y-2">
              ${item.nasiVarian.map(nasi => `
                <label class="flex items-center gap-3 p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-pink-50 transition-colors">
                  <input type="checkbox" name="nasi" value="${nasi}" onchange="updateMultiSelection('nasi')" class="w-4 h-4">
                  <span>${nasi}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Suhu Options (Es/Panas)
      if (item.suhuOptions && item.suhuOptions.length > 0) {
        html += `
          <div>
            <label class="font-bold text-gray-800 block mb-2">🌡️ Pilih Suhu:</label>
            <div class="space-y-2">
              ${item.suhuOptions.map(suhu => `
                <label class="flex items-center gap-3 p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-pink-50 transition-colors">
                  <input type="radio" name="suhu" value="${suhu}" onchange="customizationChoices.suhu = '${suhu}';" class="w-4 h-4">
                  <span>${suhu}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Generic options (untuk pilihan single)
      if (item.options && item.options.length > 0) {
        html += `
          <div>
            <label class="font-bold text-gray-800 block mb-2">⚙️ Pilih Opsi (bisa lebih dari 1):</label>
            <div class="space-y-2">
              ${item.options.map(option => `
                <label class="flex items-center gap-3 p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:bg-pink-50 transition-colors">
                  <input type="checkbox" name="options" value="${option}" onchange="updateMultiSelection('options')" class="w-4 h-4">
                  <span>${option}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Quantity
      html += `
        <div>
          <label class="font-bold text-gray-800 block mb-2">📦 Jumlah:</label>
          <div class="flex items-center gap-3 justify-center p-3 border-2 border-pink-200 rounded-lg">
            <button onclick="decreaseQuantityModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 w-10 h-10 rounded-full flex items-center justify-center font-bold transition-colors">-</button>
            <span id="qty-display" class="font-bold text-xl text-gray-800 w-8 text-center">1</span>
            <button onclick="increaseQuantityModal()" class="bg-pink-600 hover:bg-pink-700 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold transition-colors">+</button>
          </div>
        </div>
      `;

      content.innerHTML = html;
      customizationChoices.quantity = 1;

      document.getElementById('customize-modal').classList.remove('hidden');
    }

    function updateMultiSelection(fieldName) {
      const checked = Array.from(document.querySelectorAll(`input[name="${fieldName}"]:checked`)).map(el => el.value);
      customizationChoices[fieldName] = checked.join(', ');
    }

    function updateRasaSelection(itemId) {
      const item = menuItems.find(m => m.id === itemId);
      const maxRasa = item?.maxRasa || 999;
      const checked = Array.from(document.querySelectorAll(`input[name="rasa"]:checked`));
      
      if (checked.length > maxRasa) {
        checked[checked.length - 1].checked = false;
        showToast(`Max ${maxRasa} rasa dapat dipilih!`, 'error');
        return;
      }
      
      customizationChoices.rasa = checked.map(el => el.value).join(', ');
    }

    function updateToppingSelection(itemId) {
      const item = menuItems.find(m => m.id === itemId);
      const maxTopping = item?.maxTopping || 999;
      const checked = Array.from(document.querySelectorAll(`input[name="topping"]:checked`));
      
      if (checked.length > maxTopping) {
        checked[checked.length - 1].checked = false;
        showToast(`Max ${maxTopping} topping dapat dipilih!`, 'error');
        return;
      }
      
      customizationChoices.topping = checked.map(el => el.value).join(', ');
    }

    function decreaseQuantityModal() {
      if (customizationChoices.quantity > 1) {
        customizationChoices.quantity--;
        document.getElementById('qty-display').textContent = customizationChoices.quantity;
      }
    }

    function increaseQuantityModal() {
      customizationChoices.quantity++;
      document.getElementById('qty-display').textContent = customizationChoices.quantity;
    }

    function closeCustomizeModal() {
      document.getElementById('customize-modal').classList.add('hidden');
      currentCustomizing = null;
      customizationChoices = {};
    }

    function addToCartFromModal() {
      if (!currentCustomizing) return;

      const existing = cart.find(c => c.id === currentCustomizing.id);
      
      // Hitung harga tambahan dari topping (jika ada)
      let extraPrice = 0;
      if (currentCustomizing.toppingPrice && customizationChoices.topping) {
        const selectedToppings = customizationChoices.topping.split(', ').filter(t => t);
        extraPrice = selectedToppings.length * currentCustomizing.toppingPrice;
      }

      const finalPrice = currentCustomizing.price + extraPrice;
      
      if (existing) {
        existing.quantity += customizationChoices.quantity || 1;
      } else {
        cart.push({
          ...currentCustomizing,
          price: finalPrice,
          quantity: customizationChoices.quantity || 1,
          customization: { ...customizationChoices }
        });
      }

      updateCartUI();
      renderMenu();
      closeCustomizeModal();

      const countEl = document.getElementById('cart-count');
      countEl.classList.add('cart-bounce');
      setTimeout(() => countEl.classList.remove('cart-bounce'), 300);
    }

    function updateQuantity(itemId, delta) {
      const item = cart.find(c => c.id === itemId);
      if (!item) return;

      item.quantity += delta;
      if (item.quantity <= 0) {
        cart = cart.filter(c => c.id !== itemId);
      }

      updateCartUI();
      renderMenu();
      renderCartItems();
    }

    function updateCartUI() {
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      const cartCount = document.getElementById('cart-count');
      const floatingCart = document.getElementById('floating-cart');
      const floatingCount = document.getElementById('floating-cart-count');
      const cartTotal = document.getElementById('cart-total');

      if (totalItems > 0) {
        cartCount.textContent = totalItems;
        cartCount.classList.remove('hidden');
        floatingCart.classList.remove('hidden');
        floatingCount.textContent = totalItems;
      } else {
        cartCount.classList.add('hidden');
        floatingCart.classList.add('hidden');
      }

      cartTotal.textContent = formatCurrency(totalPrice);
    }

    function renderCartItems() {
      const container = document.getElementById('cart-items');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="text-center py-8">
            <span class="text-5xl mb-3 block">🛒</span>
            <p class="text-gray-500">Keranjang masih kosong</p>
            <p class="text-gray-400 text-sm">Tambahkan menu favorit Anda!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = cart.map(item => {
        const customizationText = item.customization && Object.keys(item.customization).length > 0
          ? `<p class="text-xs text-gray-500 mt-1">Pilihan: ${Object.values(item.customization).filter(v => v && v !== 0).join(' • ')}</p>`
          : '';

        return `
          <div class="flex items-start gap-3 bg-gray-50 rounded-xl p-3 mb-2">
            <span class="text-2xl">${item.emoji}</span>
            <div class="flex-1">
              <h4 class="font-medium text-gray-800 text-sm">${item.name}</h4>
              ${customizationText}
              <p class="text-pink-600 font-bold text-sm mt-1">${formatCurrency(item.price)}</p>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="updateQuantity(${item.id}, -1)" class="bg-gray-200 hover:bg-gray-300 text-gray-700 w-8 h-8 rounded-full flex items-center justify-center font-bold transition-colors">-</button>
              <span class="font-bold text-gray-800 w-6 text-center">${item.quantity}</span>
              <button onclick="updateQuantity(${item.id}, 1)" class="bg-pink-600 hover:bg-pink-700 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold transition-colors">+</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleCart() {
      const panel = document.getElementById('cart-panel');
      const overlay = document.getElementById('cart-overlay');

      if (panel.classList.contains('translate-y-full')) {
        panel.classList.remove('translate-y-full');
        overlay.classList.remove('hidden');
        renderCartItems();
      } else {
        panel.classList.add('translate-y-full');
        overlay.classList.add('hidden');
      }
    }

    async function submitOrder() {
      if (cart.length === 0) {
        showToast('Keranjang masih kosong!', 'error');
        return;
      }

      const tableNumber = document.getElementById('table-number').value.trim();
      if (!tableNumber) {
        showToast('Mohon isi nomor meja!', 'error');
        document.getElementById('table-number').focus();
        return;
      }

      if (allOrders.length >= 999) {
        showToast('Maaf, sistem sedang penuh. Silakan coba lagi nanti.', 'error');
        return;
      }

      if (isSubmitting) return;
      isSubmitting = true;

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span>Memproses...</span>';

      const customerName = document.getElementById('customer-name').value.trim();
      const paymentMethod = document.querySelector('input[name="payment-method"]:checked').value;
      const notes = document.getElementById('order-notes').value.trim();
      const orderId = generateOrderId();
      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      const itemsString = cart.map(item => {
        let itemStr = `${item.name} x${item.quantity}`;
        if (item.customization && Object.keys(item.customization).length > 0) {
          const customStr = Object.values(item.customization).filter(v => v && v !== 0).join(' | ');
          if (customStr) itemStr += ` (${customStr})`;
        }
        return itemStr;
      }).join(', ');

      const orderData = {
        order_id: orderId,
        table_number: tableNumber,
        customer_name: customerName || 'Pelanggan',
        items: itemsString,
        total_price: totalPrice,
        status: 'pending',
        created_at: new Date().toISOString(),
        notes: notes || '-',
        payment_method: paymentMethod
      };

      try {
        const result = await window.dataSdk.create(orderData);

        if (result.isOk) {
          document.getElementById('order-number').textContent = `Nomor Pesanan: ${orderId} | Pembayaran: ${paymentMethod}`;
          document.getElementById('success-modal').classList.remove('hidden');
          document.getElementById('success-modal').classList.add('flex');

          cart = [];
          updateCartUI();
          renderMenu();
          toggleCart();

          document.getElementById('customer-name').value = '';
          document.getElementById('order-notes').value = '';
          document.querySelector('input[name="payment-method"]').checked = true;
        } else {
          showToast('Gagal mengirim pesanan. Coba lagi.', 'error');
        }
      } catch (error) {
        showToast('Terjadi kesalahan. Coba lagi.', 'error');
      }

      isSubmitting = false;
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span>Pesan Sekarang</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>';
    }

    function closeSuccessModal() {
      document.getElementById('success-modal').classList.add('hidden');
      document.getElementById('success-modal').classList.remove('flex');
    }

    function toggleAdminPanel() {
      const panel = document.getElementById('admin-panel');
      if (!panel) {
        createAdminPanel();
        return;
      }

      if (panel.classList.contains('hidden')) {
        panel.classList.remove('hidden');
        adminFilterStatus = 'all';
        startAutoRefresh();
        renderAdminOrders();
      } else {
        panel.classList.add('hidden');
        stopAutoRefresh();
      }
    }

    function startAutoRefresh() {
      if (adminRefreshInterval) return;
      
      adminRefreshInterval = setInterval(() => {
        renderAdminOrders();
        updateAdminStats();
      }, 5000);
    }

    function stopAutoRefresh() {
      if (adminRefreshInterval) {
        clearInterval(adminRefreshInterval);
        adminRefreshInterval = null;
      }
    }

    function updateAdminStats() {
      const total = allOrders.length;
      const pending = allOrders.filter(o => o.status === 'pending').length;
      const completed = allOrders.filter(o => o.status === 'completed').length;

      const totalEl = document.getElementById('total-orders');
      const pendingEl = document.getElementById('pending-orders');
      const completedEl = document.getElementById('completed-orders');

      if (totalEl) totalEl.textContent = total;
      if (pendingEl) pendingEl.textContent = pending;
      if (completedEl) completedEl.textContent = completed;
    }

    function filterAdminOrders(status) {
      adminFilterStatus = status;

      document.querySelectorAll('.admin-filter-btn').forEach(btn => {
        btn.classList.remove('bg-pink-600', 'text-white');
        btn.classList.add('bg-gray-200', 'text-gray-700');
      });

      event.target.classList.remove('bg-gray-200', 'text-gray-700');
      event.target.classList.add('bg-pink-600', 'text-white');

      renderAdminOrders();
    }

    function renderAdminOrders() {
      const container = document.getElementById('admin-orders-list');
      if (!container) return;

      const filtered = adminFilterStatus === 'all'
        ? allOrders
        : allOrders.filter(order => order.status === adminFilterStatus);

      if (filtered.length === 0) {
        container.innerHTML = '<div class="text-center py-8"><p class="text-gray-500 text-lg">Tidak ada pesanan</p></div>';
        return;
      }

      container.innerHTML = filtered.map(order => {
        const isCompleted = order.status === 'completed';
        return `
          <div class="bg-gradient-to-r ${isCompleted ? 'from-green-50 to-emerald-50 border-green-200' : 'from-orange-50 to-amber-50 border-orange-200'} border-2 rounded-xl p-4">
            <div class="flex items-start justify-between mb-3">
              <div>
                <h3 class="font-bold text-lg text-gray-800">${order.order_id}</h3>
                <p class="text-sm text-gray-600">Meja: <span class="font-bold">${order.table_number}</span></p>
              </div>
              <span class="px-3 py-1 rounded-full text-xs font-bold ${isCompleted ? 'bg-green-200 text-green-800' : 'bg-orange-200 text-orange-800'}">
                ${isCompleted ? '✅ Selesai' : '⏳ Pending'}
              </span>
            </div>

            <div class="bg-white rounded-lg p-3 mb-3">
              <p class="text-sm text-gray-600 mb-1"><strong>Nama:</strong> ${order.customer_name}</p>
              <p class="text-sm text-gray-600 mb-1"><strong>Pesanan:</strong> ${order.items}</p>
              <p class="text-sm text-gray-600 mb-1"><strong>Total:</strong> <span class="font-bold text-pink-600">${formatCurrency(order.total_price)}</span></p>
              <p class="text-sm text-gray-600 mb-1"><strong>Pembayaran:</strong> <span class="font-bold ${order.payment_method === 'CASH' ? 'text-blue-600' : 'text-purple-600'}">${order.payment_method}</span></p>
              ${order.notes && order.notes !== '-' ? `<p class="text-sm text-gray-600"><strong>Catatan:</strong> ${order.notes}</p>` : ''}
            </div>

            <div class="flex gap-2">
              ${!isCompleted ? `
                <button onclick="markOrderCompleted('${order.__backendId}')" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-medium text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                  ✅ Tandai Selesai
                </button>
              ` : ''}
              <button onclick="deleteOrder('${order.__backendId}')" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-medium text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                🗑️ Hapus
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function markOrderCompleted(backendId) {
      const order = allOrders.find(o => o.__backendId === backendId);
      if (!order) return;

      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<svg class="animate-spin w-4 h-4 inline" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';

      try {
        const result = await window.dataSdk.update({ ...order, status: 'completed' });
        if (result.isOk) {
          showToast('✅ Pesanan ditandai selesai!', 'success');
        } else {
          showToast('❌ Gagal update pesanan', 'error');
          btn.disabled = false;
          btn.innerHTML = '✅ Tandai Selesai';
        }
      } catch (error) {
        showToast('❌ Terjadi kesalahan', 'error');
        btn.disabled = false;
        btn.innerHTML = '✅ Tandai Selesai';
      }
    }

    async function deleteOrder(backendId) {
      const order = allOrders.find(o => o.__backendId === backendId);
      if (!order) return;

      const btn = event.target;
      
      // Two-step delete: first click shows confirmation
      if (!btn.dataset.confirming) {
        btn.dataset.confirming = 'true';
        btn.innerHTML = '⚠️ Yakin? Klik lagi';
        btn.classList.add('ring-2', 'ring-red-500');
        
        setTimeout(() => {
          btn.removeAttribute('data-confirming');
          btn.innerHTML = '🗑️ Hapus';
          btn.classList.remove('ring-2', 'ring-red-500');
        }, 3000);
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<svg class="animate-spin w-4 h-4 inline" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';

      try {
        const result = await window.dataSdk.delete(order);
        if (result.isOk) {
          showToast('🗑️ Pesanan dihapus!', 'success');
        } else {
          showToast('❌ Gagal hapus pesanan', 'error');
          btn.disabled = false;
          btn.innerHTML = '🗑️ Hapus';
        }
      } catch (error) {
        showToast('❌ Terjadi kesalahan', 'error');
        btn.disabled = false;
        btn.innerHTML = '🗑️ Hapus';
      }
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl shadow-lg z-50 fade-in ${
        type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'
      }`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => toast.remove(), 3000);
    }

    const dataHandler = {
      onDataChanged(data) {
        allOrders = data;
        renderAdminOrders();
        updateAdminStats();
      }
    };

    async function onConfigChange(config) {

<h3>Form Pemesanan</h3>
<form id="orderForm">
    <input type="text" name="nama" placeholder="Nama Anda" required><br><br>
    <textarea name="alamat" placeholder="Alamat Lengkap" required></textarea><br><br>
    <input type="text" name="pesanan" placeholder="Menu yang dipesan" required><br><br>
    <input type="number" name="harga" placeholder="Total Transfer (Rp)" required><br><br>
    <button type="submit">Kirim Pesanan</button>
</form>

<div id="message"></div>

<script>
    // PASTE WEB_APP_URL ANDA DI SINI
    var SCRIPT_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID_HERE/exec";

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var formData = new FormData(this);
        
        fetch(SCRIPT_URL, {
            method: "POST",
            body: formData
        })
        .then(response => response.text())
        .then(result => {
            document.getElementById('message').innerText = "Pesanan terkirim! Tunggu konfirmasi admin.";
            document.getElementById('orderForm').reset();
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('message').innerText = "Gagal mengirim pesanan.";
        });
    });
</script>
