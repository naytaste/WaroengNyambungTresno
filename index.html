<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAROENG NYAMBUNG TRESNO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-2xl mx-auto p-4">
  <h1 class="text-3xl font-bold text-center">WAROENG NYAMBUNG TRESNO</h1>
  <p class="text-center text-gray-600 mb-6">ONE BITE, FALL IN TRESNO!</p>

  <div class="bg-white p-4 rounded-xl shadow mb-6">
    <label class="font-semibold">Nama Pemesan</label>
    <input id="customerName" type="text" class="w-full border p-2 rounded mt-2" placeholder="Masukkan nama">
  </div>

  <div id="menuContainer"></div>

  <div class="bg-white p-4 rounded-xl shadow mt-6">
    <h2 class="font-bold mb-2">Keranjang</h2>
    <ul id="cartItems" class="text-sm mb-2"></ul>
    <p class="font-bold">Total: Rp <span id="total">0</span></p>
    <button onclick="checkout()" class="bg-green-600 text-white w-full py-2 rounded mt-3">
      Bayar Sekarang
    </button>
  </div>
</div>

<script>
const menuData = [
  { name: "Basreng Basah", price: 5000 },
  { name: "Kentang", price: 5000 },
  { name: "Tahu Kocek", price: 5000 },
  { name: "Ropang Manis Mini", price: 2000 },
  { name: "Ropang Manis Reguler", price: 5000 },
  { name: "Ropang Asin Reguler", price: 5000 },
  { name: "Intermie", price: 4000 },
  { name: "Indomie / Sedap Series", price: 6000 },
  { name: "Nasi Bakar", price: 10000 },
  { name: "Ayam Classic Korea", price: 12000 },
  { name: "Nasi Ayam Korea", price: 15000 }
];

let cart = [];
let total = 0;

function renderMenu() {
  const container = document.getElementById("menuContainer");
  menuData.forEach(item => {
    const div = document.createElement("div");
    div.className = "bg-white p-4 rounded-xl shadow mb-4";
    div.innerHTML = `
      <h3 class="font-semibold">${item.name}</h3>
      <p class="text-sm text-gray-500 mb-2">Rp ${item.price}</p>
      <textarea id="note-${item.name.replace(/ /g,'')}" 
        placeholder="Tambahan / request khusus..." 
        class="w-full border p-2 rounded mb-2"></textarea>
      <button onclick="addToCart('${item.name}',${item.price},'note-${item.name.replace(/ /g,'')}')" 
        class="bg-blue-500 text-white px-4 py-2 rounded">
        Tambah
      </button>
    `;
    container.appendChild(div);
  });
}

function addToCart(name, price, noteId) {
  const note = document.getElementById(noteId).value;
  cart.push({ name, price, note });
  total += price;
  renderCart();
}

function renderCart() {
  const list = document.getElementById("cartItems");
  list.innerHTML = "";
  cart.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `
      <strong>${item.name}</strong> - Rp ${item.price}<br>
      <small>${item.note}</small>
    `;
    list.appendChild(li);
  });
  document.getElementById("total").innerText = total;
}

function checkout() {
  const name = document.getElementById("customerName").value;
  if (!name) {
    alert("Nama wajib diisi");
    return;
  }
  if (cart.length === 0) {
    alert("Keranjang kosong");
    return;
  }

  alert("Silakan bayar via QRIS dan tunjukkan bukti ke kasir.");
  cart = [];
  total = 0;
  renderCart();
}

renderMenu();
</script>

</body>
</html>
