<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAROENG NYAMBUNG TRESNO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-50">

<!-- HEADER -->
<div class="bg-pink-600 text-white p-5 shadow-lg">
  <h1 class="text-2xl font-bold text-center">WAROENG NYAMBUNG TRESNO</h1>
  <p class="text-center text-sm">ONE BITE, FALL IN TRESNO!</p>
</div>

<div class="max-w-6xl mx-auto p-4">

  <!-- Nama -->
  <div class="bg-white p-4 rounded-2xl shadow mb-6">
    <label class="font-semibold">Nama Pemesan</label>
    <input id="customerName" type="text"
      class="w-full border p-2 rounded-xl mt-2"
      placeholder="Masukkan nama kamu">
  </div>

  <!-- MENU GRID -->
  <div id="menuContainer"
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
  </div>

</div>

<!-- FLOATING CART -->
<div class="fixed bottom-0 left-0 right-0 bg-white shadow-2xl border-t p-4">
  <div class="flex justify-between items-center max-w-6xl mx-auto">
    <div>
      <p class="font-bold text-pink-600 text-lg">
        Total: Rp <span id="total">0</span>
      </p>
    </div>
    <button onclick="checkout()"
      class="bg-pink-600 text-white px-6 py-3 rounded-full font-semibold">
      Bayar
    </button>
  </div>
</div>

<script>
const menuData = [
{
category:"Basreng & Frozen",
items:[
{name:"Basreng Basah",price:5000,options:["Chili Oil","Sapi Panggang","Balado","BBQ","Pedas Tabur","Jagung Manis"]},
{name:"Kentang",price:5000,options:["Chili Oil","Sapi Panggang","Balado","BBQ"]},
{name:"Tahu Kocek",price:5000},
{name:"Frozen Food (1pcs)",price:1000}
]
},
{
category:"Ropang",
items:[
{name:"Ropang Manis Mini",price:2000,options:["Coklat","Matcha","Tiramisu","Blueberry","Strawberry"]},
{name:"Ropang Manis Reguler",price:5000,options:["Coklat","Matcha","Tiramisu","Blueberry","Strawberry"]},
{name:"Ropang Asin Reguler",price:5000,options:["Saus Sambal","Saus Tomat"]}
]
},
{
category:"Mie",
items:[
{name:"Intermie",price:4000,options:["Kuah","Goreng","Nyemek"]},
{name:"Indomie / Sedap Series",price:6000}
]
},
{
category:"Nasi & Ayam Korea",
items:[
{name:"Nasi Bakar",price:10000,options:["Tongkol","Ayam","Jamur","Teri"]},
{name:"Ayam Classic Korea",price:12000,options:["Blackpepper","Spicy","Garlic Butter"]},
{name:"Nasi Ayam Korea",price:15000,options:["Blackpepper","Spicy","Garlic Butter"]}
]
},
{
category:"Ice Cream",
items:[
{name:"Es Krim S",price:3000},
{name:"Es Cemil M",price:5000},
{name:"Es Cemil L",price:10000},
{name:"Es Cemil Brownies",price:15000},
{name:"Tresno Cone S",price:5000},
{name:"Tresno Cone M",price:8000},
{name:"Espressia Durian",price:7000}
]
},
{
category:"Minuman",
items:[
{name:"Teajus",price:2000},
{name:"Kopi Keplak",price:3000},
{name:"Pop Ice",price:3000},
{name:"Milo",price:4000},
{name:"Teh Tarik",price:5000},
{name:"Dancow",price:6000}
]
}
];

let total = 0;

function renderMenu(){
const container=document.getElementById("menuContainer");

menuData.forEach(cat=>{
cat.items.forEach(item=>{
const card=document.createElement("div");
card.className="bg-white rounded-2xl shadow-lg p-4 hover:shadow-xl transition";

let optionsHTML="";
if(item.options){
optionsHTML=`<select class="w-full border p-2 rounded-xl mb-2">
<option>Pilih Varian</option>
${item.options.map(o=>`<option>${o}</option>`).join("")}
</select>`;
}

card.innerHTML=`
<h3 class="font-bold text-lg mb-1">${item.name}</h3>
<p class="text-pink-600 font-semibold mb-2">Rp ${item.price}</p>
${optionsHTML}
<button class="w-full bg-pink-600 text-white py-2 rounded-xl"
onclick="addToCart(${item.price})">
Tambah
</button>
`;

container.appendChild(card);
});
});
}

function addToCart(price){
total+=price;
document.getElementById("total").innerText=total;
}

function checkout(){
const name=document.getElementById("customerName").value;
if(!name){alert("Isi nama dulu");return;}
if(total===0){alert("Belum ada pesanan");return;}
alert("Silakan bayar via QRIS dan tunjukkan bukti pembayaran.");
total=0;
document.getElementById("total").innerText=0;
}

renderMenu();
</script>

</body>
</html>
