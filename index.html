<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waroeng Nyambung Tresno</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-50 min-h-screen">

<div class="max-w-3xl mx-auto p-6">

<!-- HEADER -->
<div class="bg-gradient-to-r from-pink-500 to-rose-500 text-white p-6 rounded-3xl shadow-lg mb-8">
  <h1 class="text-3xl font-bold text-center">WAROENG NYAMBUNG TRESNO</h1>
  <p class="text-center text-pink-100 mt-2">One Bite, Fall In Tresno</p>
</div>

<!-- NAMA CUSTOMER -->
<div class="bg-white p-5 rounded-2xl shadow mb-6">
  <label class="font-semibold text-pink-700">Nama Pemesan</label>
  <input id="customerName" type="text"
    class="w-full border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 p-3 rounded-xl mt-2 outline-none"
    placeholder="Masukkan nama...">
</div>

<!-- MENU -->
<div id="menuContainer" class="space-y-8"></div>

<!-- KERANJANG -->
<div class="bg-white p-6 rounded-2xl shadow mt-10">
  <h2 class="text-xl font-bold text-pink-700 mb-4">Keranjang</h2>
  <ul id="cartItems" class="space-y-3 text-sm"></ul>
  <div class="border-t mt-4 pt-4 flex justify-between font-bold text-lg">
    <span>Total</span>
    <span>Rp <span id="total">0</span></span>
  </div>
  <button onclick="checkout()"
    class="w-full mt-6 bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-2xl text-lg transition">
    Bayar Sekarang
  </button>
</div>

</div>

<script>

const menuData = [
  {
    category:"Basreng & Kentang",
    items:[
      {
        name:"Basreng Basah",
        price:5000,
        options:{
          type:"multiple",
          label:"Pilih Bumbu",
          choices:["Chili Oil","Sapi Panggang","Balado","BBQ","Pedas Tabur","Jagung Manis"]
        }
      },
      { name:"Kentang", price:5000 },
      { name:"Tahu Kocek", price:5000 }
    ]
  },
  {
    category:"Ropang Mini",
    items:[
      {
        name:"Ropang Manis Mini",
        price:2000,
        options:{
          type:"single",
          label:"Pilih Rasa",
          choices:["Coklat","Keju","Strawberry","Tiramisu"]
        }
      },
      { name:"Ropang Manis Reguler", price:5000 },
      { name:"Ropang Asin Reguler", price:5000 }
    ]
  },
  {
    category:"Mie",
    items:[
      {
        name:"Intermie",
        price:4000,
        options:{
          type:"single",
          label:"Jenis",
          choices:["Kuah","Goreng","Nyemek"]
        }
      },
      { name:"Indomie / Sedap Series", price:6000 }
    ]
  }
];

let cart = [];
let total = 0;

function renderMenu(){
  const container = document.getElementById("menuContainer");

  menuData.forEach(category=>{
    const section = document.createElement("div");
    section.innerHTML = `<h2 class="text-2xl font-bold text-pink-700 mb-4">${category.category}</h2>`;

    category.items.forEach(item=>{
      const card = document.createElement("div");
      card.className = "bg-white p-5 rounded-2xl shadow mb-4";

      let optionsHTML = "";

      if(item.options){
        optionsHTML += `<p class="font-semibold mt-3 mb-2 text-sm text-pink-600">${item.options.label}</p>`;

        item.options.choices.forEach(choice=>{
          if(item.options.type === "single"){
            optionsHTML += `
              <label class="flex items-center gap-2 text-sm mb-1">
                <input type="radio" name="${item.name}" value="${choice}">
                ${choice}
              </label>
            `;
          }

          if(item.options.type === "multiple"){
            optionsHTML += `
              <label class="flex items-center gap-2 text-sm mb-1">
                <input type="checkbox" name="${item.name}" value="${choice}">
                ${choice}
              </label>
            `;
          }
        });
      }

      card.innerHTML = `
        <div class="flex justify-between items-center">
          <div>
            <h3 class="font-semibold">${item.name}</h3>
            <p class="text-pink-600 font-bold">Rp ${item.price}</p>
          </div>
          <button onclick="addToCart('${item.name}', ${item.price})"
            class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-xl transition">
            Tambah
          </button>
        </div>
        ${optionsHTML}
      `;

      section.appendChild(card);
    });

    container.appendChild(section);
  });
}

function addToCart(name, price){
  const selectedOptions = [];

  const inputs = document.querySelectorAll(`input[name="${name}"]:checked`);
  inputs.forEach(input=>{
    selectedOptions.push(input.value);
  });

  cart.push({
    name:name,
    price:price,
    options:selectedOptions
  });

  total += price;
  renderCart();
}

function renderCart(){
  const list = document.getElementById("cartItems");
  list.innerHTML = "";

  cart.forEach(item=>{
    const li = document.createElement("li");
    li.innerHTML = `
      <div class="bg-pink-50 p-3 rounded-xl">
        <div class="font-semibold">${item.name}</div>
        ${item.options.length ? `<div class="text-xs text-gray-600">${item.options.join(", ")}</div>` : ""}
        <div class="font-bold text-pink-600">Rp ${item.price}</div>
      </div>
    `;
    list.appendChild(li);
  });

  document.getElementById("total").innerText = total;
}

function checkout(){
  const name = document.getElementById("customerName").value;

  if(!name){
    alert("Nama wajib diisi");
    return;
  }

  if(cart.length === 0){
    alert("Keranjang kosong");
    return;
  }

  alert("Silakan bayar via QRIS dan tunjukkan bukti ke kasir.");

  cart = [];
  total = 0;
  renderCart();
}

renderMenu();

</script>

</body>
</html>
