<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAROENG NYAMBUNG TRESNO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100"><div class="max-w-2xl mx-auto p-4">
  <h1 class="text-3xl font-bold text-center">WAROENG NYAMBUNG TRESNO</h1>
  <p class="text-center text-gray-600 mb-6">ONE BITE, FALL IN TRESNO!</p>  <div class="bg-white p-4 rounded-2xl shadow mb-6">
    <label class="font-semibold">Nama Pemesan</label>
    <input id="customerName" type="text" class="w-full border p-2 rounded-xl mt-1" placeholder="Masukkan nama...">
  </div>  <div id="menuContainer" class="space-y-6"></div>  <div class="mt-8 bg-white p-4 rounded-2xl shadow">
    <h2 class="font-bold text-lg mb-3">Keranjang</h2>
    <ul id="cartItems" class="text-sm space-y-2"></ul>
    <p class="font-bold mt-3">Total: Rp <span id="total">0</span></p>
    <button onclick="checkout()" class="w-full mt-4 bg-green-600 text-white py-3 rounded-2xl text-lg">Bayar Sekarang</button>
  </div>
</div><script>
const menuData = [
  {category:"Basreng & Kentang", items:[
    {name:"Basreng Basah", price:5000},
    {name:"Kentang", price:5000},
    {name:"Tahu Kocek", price:5000}
  ]},
  {category:"Ropang Mini", items:[
    {name:"Ropang Manis Mini", price:2000},
    {name:"Ropang Manis Reguler", price:5000},
    {name:"Ropang Asin Reguler", price:5000}
  ]},
  {category:"Mie", items:[
    {name:"Intermie", price:4000},
    {name:"Indomie / Sedap Series", price:6000}
  ]},
  {category:"Nasi & Ayam Korea", items:[
    {name:"Nasi Bakar", price:10000},
    {name:"Ayam Classic Korea", price:12000},
    {name:"Nasi Ayam Korea", price:15000}
  ]},
  {category:"Ice Cream", items:[
    {name:"Es Krim S", price:3000},
    {name:"Es Cemil M", price:5000},
    {name:"Es Cemil L", price:10000}
  ]},
  {category:"Minuman", items:[
    {name:"Teajus", price:2000},
    {name:"Kopi Keplak", price:3000},
    {name:"Pop Ice", price:3000},
    {name:"Milo", price:4000}
  ]}
];

let cart = [];
let total = 0;

function renderMenu(){
  const container = document.getElementById("menuContainer");
  menuData.forEach(cat => {
    const section = document.createElement("div");
    section.innerHTML = `<h2 class="text-xl font-bold mb-2">${cat.category}</h2>`;

    cat.items.forEach(item => {
      const div = document.createElement("div");
      div.className = "bg-white p-4 rounded-2xl shadow mb-3";
      div.innerHTML = `
        <div class="flex justify-between items-center">
          <div>
            <h3 class="font-semibold">${item.name}</h3>
            <p class="text-sm text-gray-500">Rp ${item.price}</p>
          </div>
          <button onclick="addToCart('${item.name}',${item.price})" class="bg-blue-500 text-white px-4 py-2 rounded-xl">Tambah</button>
        </div>
        <textarea id="note-${item.name}" placeholder="Tambahan / request khusus..." class="w-full border p-2 rounded-xl mt-2 text-sm"></textarea>`;
  section.appendChild(div);
});

container.appendChild(section);

}); }

function addToCart(name, price){ const note = document.getElementById(note-${name})?.value || ""; cart.push({name, price, note}); total += price; renderCart(); }

function renderCart(){ const cartList = document.getElementById("cartItems"); cartList.innerHTML = ""; cart.forEach(item => { const li = document.createElement("li"); li.innerHTML = <strong>${item.name}</strong> - Rp ${item.price}<br><span class='text-gray-500'>${item.note}</span>; cartList.appendChild(li); }); document.getElementById("total").textContent = total; }

function checkout(){ const name = document.getElementById("customerName").value; if(!name){ alert("Nama wajib diisi"); return; } if(cart.length === 0){ alert("Keranjang kosong"); return; }

const orderData = { customer:name, items:cart, total:total, time:new Date().toLocaleString() };

console.log("ORDER MASUK:", orderData); alert("Silakan bayar via QRIS. Setelah transfer, tunjukkan bukti ke kasir.");

cart = []; total = 0; renderCart(); }

renderMenu(); </script>

</body>
</html>
