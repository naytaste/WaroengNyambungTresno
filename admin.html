<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - WaroengNyambungTresno</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #333; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #ffd700; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #444; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-box h2 { font-size: 36px; color: #4CAF50; }
        .stat-box p { color: #aaa; }
        .stat-box.red h2 { color: #f44336; }
        table { width: 100%; border-collapse: collapse; background: #444; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #555; }
        th { background: #555; color: #ffd700; }
        tr:hover { background: #555; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn-lunas { background: #4CAF50; color: white; }
        .btn-hapus { background: #f44336; color: white; }
        .status { padding: 5px 10px; border-radius: 3px; font-size: 12px; }
        .belum-bayar { background: #f44336; color: white; }
        .sudah-bayar { background: #4CAF50; color: white; }
        .refresh-btn { background: #2196F3; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        .refresh-btn:hover { background: #1976D2; }
        .empty-message { text-align: center; padding: 50px; color: #aaa; }
        .logout { float: right; background: #f44336; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logout">🚪 Keluar</a>
        <h1>🔐 Admin Waroeng Nyambung Tresno</h1>
        
        <!-- STATISTIK -->
        <div class="stats">
            <div class="stat-box">
                <h2 id="totalPesanan">0</h2>
                <p>Total Pesanan</p>
            </div>
            <div class="stat-box red">
                <h2 id="belumBayar">0</h2>
                <p>Belum Bayar</p>
            </div>
            <div class="stat-box">
                <h2 id="sudahBayar">0</h2>
                <p>Sudah Bayar</p>
            </div>
        </div>
        
        <!-- TOMBOL REFRESH -->
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
        
        <!-- TABEL PESANAN -->
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Waktu</th>
                    <th>Nama</th>
                    <th>Alamat</th>
                    <th>Pesanan</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelPesanan">
                <tr><td colspan="8" class="empty-message">Klik "Refresh Data" untuk memuat pesanan</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // ============================================
        // GANTI DENGAN WEB_APP_URL ANDA DI BAWAH INI
        // ============================================
        var WEB_APP_URL = "https://script.google.com/macros/s/YOUR_WEB_APP_URL_HERE/exec";
        // ============================================

        function formatTanggal(timestamp) {
            var date = new Date(timestamp);
            return date.toLocaleDateString('id-ID') + ' ' + date.toLocaleTimeString('id-ID');
        }

        function loadData() {
            var tbody = document.getElementById('tabelPesanan');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">⏳ Memuat data...</td></tr>';
            
            fetch(WEB_APP_URL)
            .then(response => response.json())
            .then(data => {
                var pesanan = data.data.reverse(); // Terbaru di atas
                var html = '';
                var belumBayar = 0;
                var sudahBayar = 0;
                
                if (pesanan.length === 0) {
                    html = '<tr><td colspan="8" class="empty-message">Belum ada pesanan</td></tr>';
                } else {
                    pesanan.forEach(function(p, index) {
                        var statusClass = p.Status === 'Sudah Bayar' ? 'sudah-bayar' : 'belum-bayar';
                        var btnAksi = p.Status === 'Sudah Bayar' 
                            ? '<span style="color:#4CAF50;">✓ Lunas</span>'
                            : '<button class="btn btn-lunas" onclick="updateStatus(\'' + p.Timestamp + '\', \'Sudah Bayar\')">💰 Tandai Lunas</button>';
                        
                        if (p.Status === 'Sudah Bayar') {
                            sudahBayar++;
                        } else {
                            belumBayar++;
                        }
                        
                        html += '<tr>';
                        html += '<td>' + (index + 1) + '</td>';
                        html += '<td>' + formatTanggal(p.Timestamp) + '</td>';
                        html += '<td>' + p.Nama + '</td>';
                        html += '<td>' + p.Alamat + '</td>';
                        html += '<td>' + p.Pesanan + '</td>';
                        html += '<td>Rp ' + parseInt(p.Total).toLocaleString() + '</td>';
                        html += '<td><span class="status ' + statusClass + '">' + p.Status + '</span></td>';
                        html += '<td>' + btnAksi + '</td>';
                        html += '</tr>';
                    });
                }
                
                tbody.innerHTML = html;
                document.getElementById('totalPesanan').innerText = pesanan.length;
                document.getElementById('belumBayar').innerText = belumBayar;
                document.getElementById('sudahBayar').innerText = sudahBayar;
            })
            .catch(error => {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-message">❌ Gagal memuat data. Periksa koneksi atau URL.</td></tr>';
                console.error('Error:', error);
            });
        }

        function updateStatus(timestamp, statusBaru) {
            if (!confirm('Yakin ingin mengubah status pembayaran?')) return;
            
            // Karena GAS tidak punya endpoint update, kita perlu workaround
            // Buka Google Sheets dan ubah manual, atau hubungi developer
            alert('Untuk update status pembayaran:\n\n1. Buka Google Sheets Anda\n2. Cari pesanan dengan timestamp: ' + timestamp + '\n3. Ubah kolom "Status" jadi "Sudah Bayar"\n\nAtau hubungi saya untuk tambahkan fitur update otomatis.');
        }

        // Load data saat halaman dibuka
        loadData();
    </script>
</body>
</html>
