<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin WaroengNyambungTresno</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        .btn-lunas { background-color: #008CBA; color: white; border: none; padding: 5px 10px; cursor: pointer; }
        .status-lunas { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Daftar Pesanan Masuk</h2>
    <button onclick="loadData()" style="padding: 10px; cursor:pointer;">Refresh Data</button>
    
    <table id="orderTable">
        <thead>
            <tr>
                <th>Waktu</th>
                <th>Nama</th>
                <th>Alamat</th>
                <th>Pesanan</th>
                <th>Total</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody><!-- Data akan muncul di sini --></tbody>
    </table>

    <script>
        // https://script.google.com/macros/s/AKfycbzuEXxFsRJBm_D3011Egz7UkZVRSBb91kDRZWbcpgt41yhJbEGsXpi1gMGaEUXM4jo-/exec
        var SCRIPT_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID_HERE/exec";

        function loadData() {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    var tableBody = document.querySelector("#orderTable tbody");
                    tableBody.innerHTML = "";
                    
                    // Urutkan dari yang terbaru
                    data.data.reverse().forEach(function(row) {
                        var tr = document.createElement("tr");
                        var statusClass = row['Status Pembayaran'] === 'Telah Dibayar' ? 'status-lunas' : '';
                        
                        tr.innerHTML = `
                            <td>${new Date(row['Timestamp']).toLocaleString()}</td>
                            <td>${row['Nama Pemesan']}</td>
                            <td>${row['Alamat']}</td>
                            <td>${row['Pesanan']}</td>
                            <td>${row['Total Harga']}</td>
                            <td class="${statusClass}">${row['Status Pembayaran']}</td>
                            <td>
                                ${row['Status Pembayaran'] === 'Belum Dibayar' 
                                  ? `<button class="btn-lunas" onclick="updatePayment('${row['Timestamp']}')">Tandai Lunas</button>` 
                                  : 'Selesai'}
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });
                });
        }

        // Fungsi simpan (tanpa backend tambahan, cukup panggil API khusus jika perlu, 
        // tapi untuk simplicity di admin ini kita cukup melihat data dulu. 
        // Fitur update pembayaran perlu endpoint khusus di GAS, 
        // jika Anda butuh fitur klik tombol "Lunas", tambahkan fungsi doPost kecil di GAS.)
        
        // Load data saat halaman dibuka
        loadData();
    </script>
</body>
</html>
